<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Insights Admin — Clicks Export</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;max-width:1000px;margin:2rem auto;padding:1rem}
    table{width:100%;border-collapse:collapse;margin-top:1rem}
    th,td{border:1px solid #eee;padding:8px;text-align:left;font-size:13px}
    pre{white-space:pre-wrap;background:#fafafa;padding:12px;border:1px solid #eee}
    .row {display:flex;gap:8px}
  </style>
  <meta name="ga-id" content="G-9CXFF6HMVN" />
</head>
<body>
  <h1>Insights — Click Events</h1>
  <p>This page reads stored click events from localStorage (browser) and lets you review and export them. Events are stored when GA isn't configured or as a backup.</p>
  <div class="row">
    <button id="load">Load events</button>
    <button id="export">Download JSON</button>
    <button id="clear">Clear stored events</button>
  </div>
  <div id="count"></div>
  <div id="table-wrap"></div>

  <script>
    function load(){
      const raw = localStorage.getItem('insights_clicks') || '[]';
      let data = [];
      try{ data = JSON.parse(raw); }catch(e){ data = []; }
      document.getElementById('count').textContent = data.length + ' events';
      if (!data.length) { document.getElementById('table-wrap').innerHTML = '<p>No events found.</p>'; return; }
      const rows = data.map(d => '<tr><td>'+ (d.ts || '') +'</td><td>'+ (d.name || '') +'</td><td>'+ (d.params && d.params.title ? escapeHtml(d.params.title) : (d.params && d.params.href? escapeHtml(d.params.href): '')) +'</td><td>'+ (d.params && JSON.stringify(d.params) || '') +'</td></tr>').join('');
      document.getElementById('table-wrap').innerHTML = '<table><thead><tr><th>Time</th><th>Event</th><th>Title/URL</th><th>Params</th></tr></thead><tbody>'+rows+'</tbody></table>';
    }
    function escapeHtml(s){ return (s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    document.getElementById('load').addEventListener('click', load);
    document.getElementById('export').addEventListener('click', function(){ const data = localStorage.getItem('insights_clicks') || '[]'; const blob = new Blob([data], {type:'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'insights_clicks.json'; a.click(); URL.revokeObjectURL(url); });
    document.getElementById('clear').addEventListener('click', function(){ if(confirm('Clear stored events?')){ localStorage.removeItem('insights_clicks'); load(); } });
    // auto-load
    load();
  </script>
<script src="/analytics.js"></script>
</body>
</html>
